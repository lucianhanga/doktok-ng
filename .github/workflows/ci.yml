name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: doktok
          POSTGRES_PASSWORD: doktok
          POSTGRES_DB: doktok
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doktok -d doktok"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DOKTOK_DATABASE_URL: postgresql://doktok:doktok@localhost:5432/doktok
    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries (libmagic)
        run: sudo apt-get update && sudo apt-get install -y libmagic1
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy contracts core apps/backend apps/worker storage modalities
      - name: Pytest (includes Postgres integration)
        run: uv run pytest
      - name: Import boundaries (import-linter)
        run: uv run lint-imports

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Test
        run: pnpm -r test
      - name: Dependency audit (pnpm)
        continue-on-error: true # informational for now; tighten to a gate once the tree is clean
        run: pnpm audit --audit-level high

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Secret scan (detect-secrets)
        run: git ls-files -z | xargs -0 uvx --from detect-secrets detect-secrets-hook --baseline .secrets.baseline
      - name: Dependency audit (pip-audit)
        continue-on-error: true # informational for now; tighten to a gate once advisories are triaged
        run: |
          uv export --format requirements-txt --all-packages --no-emit-project -o /tmp/req.txt
          uvx pip-audit -r /tmp/req.txt
