name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether the change touches anything other than documentation. Docs-only changes
  # (docs/**, any *.md including top-level CHANGELOG.md, LICENSE) skip the heavy Python + Frontend
  # jobs below; the secret scan still runs (docs can leak tokens in examples). Keeps docs PRs fast.
  #
  # paths-filter ORs the patterns in a rule (a file matches the rule if ANY pattern matches), so the
  # exclusion must be ONE negated brace pattern, not a list of `!`-lines (a `**` + `!...` list would
  # always match via `**`). It must also be brace-expanded, not an extglob `!(a|b)`: `**` does not
  # globstar inside `!(...)`, so `!(docs/**|**/*.md)` wrongly counted nested docs files as code.
  # `**/*.md` needs a directory prefix, hence the extra top-level `*.md`.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!{docs/**,**/*.md,*.md,LICENSE}'

  python:
    name: Python checks
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: doktok
          POSTGRES_PASSWORD: doktok
          POSTGRES_DB: doktok
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doktok -d doktok"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DOKTOK_DATABASE_URL: postgresql://doktok:doktok@localhost:5432/doktok
    steps:
      - uses: actions/checkout@v4
      - name: Install system libraries (libmagic)
        run: sudo apt-get update && sudo apt-get install -y libmagic1
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync workspace
        run: uv sync --all-packages
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy contracts core apps/backend apps/worker apps/mcp storage modalities
      - name: Pytest (includes Postgres integration)
        run: uv run pytest
      - name: Import boundaries (import-linter)
        run: uv run lint-imports

  frontend:
    name: Frontend checks
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Test
        run: pnpm -r test
      - name: Dependency audit (pnpm)
        continue-on-error: true # informational for now; tighten to a gate once the tree is clean
        run: pnpm audit --audit-level high

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # Gates on NEW secrets only. detect-secrets-hook used to fail whenever an
      # allowlisted secret merely shifted lines (a comment added above it), which
      # broke routine PRs; this compares secrets by content hash, ignoring line
      # numbers. See scripts/detect_secrets_check.py.
      - name: Secret scan (detect-secrets)
        env:
          DETECT_SECRETS: uvx --from detect-secrets detect-secrets  # pragma: allowlist secret
        run: python3 scripts/detect_secrets_check.py
      - name: Dependency audit (pip-audit)
        continue-on-error: true # informational for now; tighten to a gate once advisories are triaged
        run: |
          uv export --format requirements-txt --all-packages --no-emit-project -o /tmp/req.txt
          uvx pip-audit -r /tmp/req.txt
