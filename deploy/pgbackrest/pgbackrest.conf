# pgBackRest config mounted into the db container (M12 DB-A1). The cipher pass is NOT here - it is
# supplied via the PGBACKREST_REPO1_CIPHER_PASS env var (set from DOKTOK_PGBACKREST_CIPHER_PASS in
# compose) so the secret never lands in a committed file. repo1-path is a volume also visible to the
# host so azure-sync.sh can ship it offsite.
[global]
repo1-path=/var/lib/doktok/pg
repo1-retention-full=2
repo1-cipher-type=aes-256-cbc
compress-type=lz4
process-max=2
start-fast=y
# Logs/locks must live where the postgres OS user can write (the repo bind mount is postgres-owned;
# /var/log/pgbackrest and /tmp are not writable by postgres in the stock image).
log-path=/var/lib/doktok/pg/log
lock-path=/var/lib/doktok/pg/lock

[doktok]
pg1-path=/var/lib/postgresql/data
# The DB superuser/db is "doktok" (POSTGRES_USER/DB), not the pgBackRest default "postgres";
# stanza-create/check connect to the cluster, so they must be told the real role + database.
pg1-user=doktok
pg1-database=doktok
