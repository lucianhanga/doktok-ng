# Production stack for the hybrid N95 deployment (M11 #318). Runs the full app as containers:
# Postgres+pgvector, Gotenberg, Ollama (embedder only), backend, worker, and the Caddy UI/proxy.
# Only Caddy publishes a host port; everything else is reachable only on the internal network.
# See docs/operations/deployment-trigkey-n95.md and ADR-0020.
#
# Hybrid AI split: OCR + embeddings run locally (PaddleOCR + the Ollama embedder); the enrichment
# pipeline and RAG chat run on OpenAI. The provider selection + OpenAI key live in the DB
# (Settings UI), or are seeded from env (DOKTOK_OPENAI_API_KEY fallback APP-7; provider selection
# via DOKTOK_PIPELINE_PROVIDER/DOKTOK_RAG_PROVIDER, headless seeding APP-2/#325).
#
# Per-container resource limits (#323) cap the 8 GB box; TLS is enabled by setting
# DOKTOK_SITE_ADDRESS to a domain (#321). Backups are #330. After first start, pull the embedder:
#   docker compose -f docker-compose.prod.yml exec ollama ollama pull qwen3-embedding:0.6b
#
# Required env (e.g. an untracked .env.production; see #340 DEVOPS-11):
#   DOKTOK_DB_PASSWORD, DOKTOK_TENANT_TOKENS (JSON), DOKTOK_API_TOKEN (one of the tenant tokens),
#   and optionally DOKTOK_OPENAI_API_KEY, DOKTOK_PIPELINE_PROVIDER, DOKTOK_RAG_PROVIDER,
#   DOKTOK_SITE_ADDRESS (a domain enables automatic HTTPS).

name: doktok-prod

x-app-env: &app-env
  DOKTOK_DATABASE_URL: postgresql://doktok:${DOKTOK_DB_PASSWORD}@db:5432/doktok
  DOKTOK_OLLAMA_BASE_URL: http://ollama:11434
  DOKTOK_GOTENBERG_URL: http://gotenberg:3000
  DOKTOK_FILES_ROOT: /data/files
  # The worker derives the tenants it watches from this token map (one ingest tree per tenant), and
  # the backend authenticates requests against it - BOTH services need it, so it lives in the anchor.
  DOKTOK_TENANT_TOKENS: ${DOKTOK_TENANT_TOKENS:?set DOKTOK_TENANT_TOKENS}
  # Service-name Ollama URL is not loopback, so NO_EGRESS must be false (the loopback validator
  # would otherwise refuse to start). Outbound egress is restricted at the host firewall (#322).
  DOKTOK_NO_EGRESS: "false"
  DOKTOK_OPENAI_API_KEY: ${DOKTOK_OPENAI_API_KEY:-}
  # Encrypt the OpenAI key at rest (APP-8) + structured logs (APP-12).
  DOKTOK_SECRETS_KEY: ${DOKTOK_SECRETS_KEY:-}
  DOKTOK_LOG_FORMAT: ${DOKTOK_LOG_FORMAT:-json}
  DOKTOK_LOG_LEVEL: ${DOKTOK_LOG_LEVEL:-INFO}
  # Headless AI provider split (APP-2); seeded only on a fresh DB, never overwrites UI edits.
  DOKTOK_PIPELINE_PROVIDER: ${DOKTOK_PIPELINE_PROVIDER:-}
  DOKTOK_PIPELINE_MODEL: ${DOKTOK_PIPELINE_MODEL:-}
  DOKTOK_RAG_PROVIDER: ${DOKTOK_RAG_PROVIDER:-}
  DOKTOK_RAG_MODEL: ${DOKTOK_RAG_MODEL:-}

# Bounded container logs so they survive restarts without filling the SSD (#335 DEVOPS-8).
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    # Built image adds pgBackRest for WAL archiving / PITR (M12 DB-A1).
    build:
      context: .
      dockerfile: deploy/docker/db.Dockerfile
    image: ghcr.io/lucianhanga/doktok-ng-db:${DOKTOK_IMAGE_TAG:-latest}
    container_name: doktok-prod-db
    # Continuous WAL archiving: archive_command runs pgBackRest archive-push inside this container.
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=pgbackrest --stanza=doktok archive-push %p
      - -c
      - max_wal_size=2GB
    environment:
      POSTGRES_USER: doktok
      POSTGRES_PASSWORD: ${DOKTOK_DB_PASSWORD:?set DOKTOK_DB_PASSWORD}
      POSTGRES_DB: doktok
      # Repo encryption pass for pgBackRest (M12); set from .env, stored off-box. No key in any file.
      PGBACKREST_REPO1_CIPHER_PASS: ${DOKTOK_PGBACKREST_CIPHER_PASS:?set DOKTOK_PGBACKREST_CIPHER_PASS}
    volumes:
      - doktok-pgdata:/var/lib/postgresql/data
      - ./deploy/pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      # Local-first repo: also visible to the host so azure-sync.sh can ship it offsite.
      - ${DOKTOK_BACKUP_DIR:-./backups}/pg:/var/lib/doktok/pg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doktok -d doktok"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *logging
    # Resource caps for the 8 GB box (#323). Limits ~ db .75g + gotenberg .5g + ollama 1.75g +
    # backend .75g + worker 2.5g + caddy .25g = ~6.5g, leaving ~1g for the OS. The worker cap holds
    # two PaddleOCR processes (~1g each) so OCR_CONCURRENCY=2 is viable on this box.
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
    restart: unless-stopped

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: doktok-prod-gotenberg
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: doktok-prod-ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "2"
      OLLAMA_KEEP_ALIVE: "60m"
    volumes:
      - doktok-ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama ps >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1792m
          cpus: "2.0"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: ghcr.io/lucianhanga/doktok-ng-backend:${DOKTOK_IMAGE_TAG:-latest}
    container_name: doktok-prod-backend
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      gotenberg:
        condition: service_started
    environment:
      <<: *app-env
      DOKTOK_BIND_HOST: 0.0.0.0
      # DOKTOK_TENANT_TOKENS now comes from the shared anchor (worker needs it too).
      # Limited-prod hardening (APP-9/APP-10).
      DOKTOK_RATE_LIMIT_PER_MINUTE: ${DOKTOK_RATE_LIMIT_PER_MINUTE:-0}
      DOKTOK_MAX_REQUEST_MB: ${DOKTOK_MAX_REQUEST_MB:-25}
      DOKTOK_CORS_ORIGINS: ${DOKTOK_CORS_ORIGINS:-[]}
      # DRP (M12 #377): read the backup freshness sentinels written by the backup orchestrator.
      DOKTOK_BACKUP_DIR: /var/lib/doktok/backups
      DOKTOK_DEPLOY_MODE: ${DOKTOK_DEPLOY_MODE:-compose}
      DOKTOK_AZURE_CONTAINER: ${DOKTOK_AZURE_CONTAINER:-}
      DOKTOK_AZURE_SAS: ${DOKTOK_AZURE_SAS:-}
    volumes:
      - doktok-files:/data/files
      # Read-only view of the host backup dir so the DRP panel can read status/ sentinels (M12 #377).
      - ${DOKTOK_BACKUP_DIR:-./backups}:/var/lib/doktok/backups:ro
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: ghcr.io/lucianhanga/doktok-ng-worker:${DOKTOK_IMAGE_TAG:-latest}
    container_name: doktok-prod-worker
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      gotenberg:
        condition: service_started
    environment:
      <<: *app-env
      # N95 tuning (#324 DEVOPS-4): OCR on CPU with bounded parallelism; enrichment is remote so the
      # reconciler can fan out, but each reconcile also hits the local embedder - keep it moderate.
      DOKTOK_OCR_CONCURRENCY: ${DOKTOK_OCR_CONCURRENCY:-2}
      DOKTOK_OCR_CPU_THREADS: ${DOKTOK_OCR_CPU_THREADS:-1}
      # Disable on N95/Alder Lake-N (oneDNN PIR crash); harmless to leave true on capable CPUs.
      DOKTOK_OCR_ENABLE_MKLDNN: ${DOKTOK_OCR_ENABLE_MKLDNN:-true}
      DOKTOK_INGEST_CONCURRENCY: ${DOKTOK_INGEST_CONCURRENCY:-2}
      DOKTOK_OPENAI_RECONCILE_CONCURRENCY: ${DOKTOK_OPENAI_RECONCILE_CONCURRENCY:-6}
    volumes:
      - doktok-files:/data/files
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 2560m
          cpus: "2.0"
    # Long enough for the SIGTERM -> PaddleOCR pool teardown to finish.
    stop_grace_period: 60s
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    image: ghcr.io/lucianhanga/doktok-ng-ui:${DOKTOK_IMAGE_TAG:-latest}
    container_name: doktok-prod-caddy
    depends_on:
      backend:
        condition: service_started
    environment:
      DOKTOK_BACKEND_URL: backend:8000
      DOKTOK_API_TOKEN: ${DOKTOK_API_TOKEN:?set DOKTOK_API_TOKEN (must be one of DOKTOK_TENANT_TOKENS)}
      # Site address (#321): ":80" = plain HTTP (default); a domain (e.g. "docs.example.com") turns
      # on automatic HTTPS via Let's Encrypt. For a LAN host with no public domain, set an https://
      # address and uncomment `tls internal` in apps/ui/Caddyfile (see the deployment guide).
      DOKTOK_SITE_ADDRESS: ${DOKTOK_SITE_ADDRESS:-:80}
    volumes:
      # Persist issued certificates across restarts.
      - doktok-caddy:/data
    ports:
      - "${DOKTOK_HTTP_PORT:-80}:80"
      - "${DOKTOK_HTTPS_PORT:-443}:443"
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

  # Backup runner (M12 #377): on-demand container with restic + the deploy scripts, mounting the
  # files volume (ro) and the host backup dir (rw). The compose-mode orchestrator runs the SAME
  # backup-files.sh here that runs on the host in dev. Not started by default (profile "tools");
  # invoked via `docker compose run --rm backup-runner deploy/<script>` from deploy/backup.sh.
  backup-runner:
    build:
      context: .
      dockerfile: deploy/docker/backup-runner.Dockerfile
    image: ghcr.io/lucianhanga/doktok-ng-backup-runner:${DOKTOK_IMAGE_TAG:-latest}
    profiles: ["tools"]
    environment:
      DOKTOK_BACKUP_DIR: /backups
      DOKTOK_FILES_ROOT: /data/files
      DOKTOK_RESTIC_PASSWORD: ${DOKTOK_RESTIC_PASSWORD:?set DOKTOK_RESTIC_PASSWORD}
    volumes:
      - doktok-files:/data/files:ro
      - ${DOKTOK_BACKUP_DIR:-./backups}:/backups
    logging: *logging

volumes:
  doktok-pgdata:
  doktok-ollama:
  doktok-files:
  doktok-caddy:
